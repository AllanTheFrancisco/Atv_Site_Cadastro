<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Redefinir Senha</h2>
        <form id="resetForm">
            <label>E-mail cadastrado:</label>
            <input type="email" id="email" placeholder="E-mail da conta">
            
            <label>Nova senha:</label>
            <div class="campo-senha">
                <input type="password" id="novaSenha" placeholder="Digite a nova senha">
                <span class="olho" onclick="toggleSenha('novaSenha')">👁️</span>
            </div>

            <button type="submit">Atualizar Credenciais</button>
            <p style="margin-top: 15px;"><a href="login.html">Voltar para o Login</a></p>
        </form>

        <p id="mensagem" class="erro"></p>
        <p id="mensagemSucesso" class="sucesso"></p>
    </div>
    <script src="reset.js"></script>
</body>
</html>
